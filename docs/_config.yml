title: SpeedCE Technical Documentation
description: >-
  Multi-node website speed test · HTTP/HTTPS/PING/TCPing/DNS/Traceroute tool dropdown ·
  210+ long-form technical guides. SpeedCE: https://www.speedce.com
lang: en
url: https://freejbgo.github.io
baseurl: /SpeedCE-English-Tech

theme: minima

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM

defaults:
  - scope:
      path: "articles"
      type: "pages"
    values:
      layout: default
      permalink: articles/:name.html

exclude:
  - articles/README.md
